syntax = "proto3";

package fighter.agent.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/easy-tactics/api/proto/gen/fighter/agent/v1;fapiv1";

service AIService {
  rpc AnalyzeFight(AnalyzeFightRequest) returns (AnalysisResult);
  rpc GenerateSummary(GenerateSummaryRequest) returns (SummaryResult);
  rpc SearchVideos(SearchVideosRequest) returns (VideosResult);
  rpc ParseHemagon(ParseHemagonRequest) returns (ParseResult);
}

message AnalyzeFightRequest {
  string fighter_uuid = 1;
  string fight_uuid = 2;
  string video_url = 3;
  string opponent_name = 4;
  int32 score_win = 5;
  int32 score_lose = 6;
  string round = 7;
}

message AnalysisResult {
  string uuid = 1;
  string fighter_uuid = 2;
  repeated string observations = 3;
  repeated string techniques = 4;
  string summary = 5;
  google.protobuf.Timestamp analyzed_at = 6;
}

message GenerateSummaryRequest {
  string fighter_uuid = 1;
  repeated string fight_uuids = 2;
  bool include_tournaments = 3;
}

message SummaryResult {
  string fighter_uuid = 1;
  string content = 2;
  int32 version = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message SearchVideosRequest {
  string fighter_name = 1;
  string tournament = 2;
  repeated string fight_uuids = 3;
  bool search_vk = 4;
  bool search_youtube = 5;
}

message VideosResult {
  message Video {
    string platform = 1;
    string url = 2;
    string title = 3;
    int32 duration_seconds = 4;
    string fight_uuid = 5;
  }
  repeated Video videos = 1;
  repeated string not_found = 2;
}

message ParseHemagonRequest {
  string fighter_slug = 1;
  bool include_tournaments = 2;
  bool include_fights = 3;
}

message ParseResult {
  string fighter_uuid = 1;
  string hemagon_url = 2;
  int32 tournaments_count = 3;
  int32 fights_count = 4;
  google.protobuf.Timestamp parsed_at = 5;
}